# TLS-1.2-floor conformance — S4
#
# Client presents NO client certificate at all (`tls.no_client_cert: true`
# strips whatever key/cert the --target would otherwise supply for this
# scenario only — see ScenarioRunner's ScenarioDefinition.tls doc). No TLS
# version override here: deliberately isolate ONE variable (the missing
# client cert) from the S1/S3 version-floor variable, so a rejection here
# can only be attributed to mTLS enforcement, not an unrelated TLS-version
# mismatch. The server CA the target supplies is left in place (server-cert
# verification still succeeds) — only the CLIENT side of mTLS is missing.
#
# The broker enforces mTLS regardless of the version-floor change — this
# scenario proves that lowering the floor from 1.3-only to 1.2+ did NOT
# also loosen client-certificate enforcement. Connection MUST be REJECTED.
#
# `expect_connect_failure: true` — see s3-rejects-tls11-below-floor.yaml
# for the full doc on what "rejected" covers (explicit error OR a bounded
# timeout, since some handshake failures surface as a bare reset).
#
# Run against a live broker, e.g.:
#   simulator run --scenario scenarios/tls-floor/s4-rejects-missing-client-cert.yaml \
#     --target uat
# stationId does not need to resolve to a real provisioned identity — the
# client never gets far enough to present one.
#
# NEEDS A LIVE BROKER — not run in this authoring piece (C3). Deferred to
# the deploy step.
name: "TLS floor S4 — rejects a connection with no client certificate"
description: "Client omits the client certificate entirely (tls.no_client_cert: true). mTLS enforcement MUST still reject the connection — expect_connect_failure: true."
tls:
  no_client_cert: true
expect_connect_failure: true
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
# No steps: the connection never completes — see s3's doc for why.
steps: []
