name: "Slow Responses"
description: "Station configured with very slow response behavior (3-5 seconds). Tests that the server tolerates delayed responses without timing out or erroring."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [3000, 5000]
steps:
  # --- Boot with slow behavior ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available (required so api_call doesn't 409 BAY_NOT_READY) ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  - action: delay
    ms: 500

  # --- Trigger StartService via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/start"
    background: true
    body:
      bay_id: "{{bayId_1}}"
      service_id: "{{serviceId_1}}"
      duration_seconds: 300
    expect_status: 201

  # --- Wait for StartService (slow response delay applied by behavior) ---
  # Per C-017: response_delay_ms [3000, 5000] applies to multiple round-trips;
  # bump timeout to 30s to absorb chaos-induced latency.
  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 30000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"
      serviceId: "payload.serviceId"

  # --- Accept StartService (response_delay_ms [3000,5000] is applied by behavior) ---
  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"
