name: "Status All Bay States"
description: "Boot and send StatusNotification for every possible bay status: Available, Occupied, Reserved, Finishing, Faulted, Unavailable, Unknown."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 5000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # Status: Available
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  - action: delay
    ms: 300

  # Status: Occupied
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: false

  - action: delay
    ms: 300

  # Status: Reserved
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Reserved"
      previousStatus: "Occupied"
      services:
        - serviceId: "{{serviceId_1}}"
          available: false

  - action: delay
    ms: 300

  # Status: Finishing
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Finishing"
      previousStatus: "Reserved"
      services:
        - serviceId: "{{serviceId_1}}"
          available: false

  - action: delay
    ms: 300

  # Status: Faulted
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Faulted"
      previousStatus: "Finishing"
      errorCode: 5001
      errorText: "Water pump pressure below threshold"
      services:
        - serviceId: "{{serviceId_1}}"
          available: false

  - action: delay
    ms: 300

  # Status: Unavailable
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Unavailable"
      previousStatus: "Faulted"
      services:
        - serviceId: "{{serviceId_1}}"
          available: false

  - action: delay
    ms: 300

  # Status: Unknown
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Unknown"
      previousStatus: "Unavailable"
      services:
        - serviceId: "{{serviceId_1}}"
          available: false
