name: "Boot Watchdog"
description: "Boot with Watchdog reason after station was running for 1 hour, assert Accepted."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 3600
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "Watchdog"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 5000
    capture:
      heartbeatInterval: "payload.heartbeatIntervalSec"
      bootStatus: "payload.status"

  - action: assert
    field: "payload.status"
    equals: "Accepted"
