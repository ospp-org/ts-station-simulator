name: "Heartbeat Timeout"
description: "Boot, send heartbeat, and wait with a very short timeout to test timeout handling. Expected to fail if server is slow."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    # Aligned with global default bump (5s → 15s, commit 9e57ce2). Sprint B2
    # timeout sweep — sister scenario from Sprint B P5.1/P5.11 fix (commit
    # 3fdc7a6). UAT first-round-trip can exceed 5s.
    timeout_ms: 15000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: send
    message: Heartbeat
    payload: {}

  - action: wait_for
    message: Heartbeat
    messageType: Response
    # Aligned with global default bump (5s → 15s, commit 9e57ce2). Sprint B2
    # timeout sweep — Heartbeat round-trip can exceed 5s under UAT latency.
    timeout_ms: 15000
    capture:
      serverTime: "payload.serverTime"
