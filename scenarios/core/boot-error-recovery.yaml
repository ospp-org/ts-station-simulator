name: "Boot Error Recovery"
description: "Boot after error recovery with pending offline transactions, assert Accepted."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 3
      timezone: "Europe/Bucharest"
      bootReason: "ErrorRecovery"
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
      networkInfo:
        connectionType: "Wifi"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 5000
    capture:
      heartbeatInterval: "payload.heartbeatIntervalSec"
      bootStatus: "payload.status"

  - action: assert
    field: "payload.status"
    equals: "Accepted"
