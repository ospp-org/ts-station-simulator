name: "Happy Boot"
description: "Complete boot flow - send BootNotification with PowerOn reason, wait for response, assert Accepted, send StatusNotification for each bay."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 5000
    capture:
      heartbeatInterval: "payload.heartbeatIntervalSec"
      bootStatus: "payload.status"

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_2}}"
      bayNumber: 2
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true
