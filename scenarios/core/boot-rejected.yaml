name: "Boot Rejected"
description: "Deactivate station via admin is_active toggle to force production-canonical Rejected boot, then reactivate and retry to assert Accepted. Uses real PATCH /api/v1/admin/stations/{stationId}/active per csms-server admin routes (no test-only conformance endpoints)."
station:
  stationId: "stn_0000001d"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
    auto_retry_boot: false
steps:
  # Setup: deactivate station so next boot will be Rejected
  # (per csms-server BootNotificationHandler.php:67-81 — when station.is_active is false)
  - action: api_call
    method: PATCH
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/active"
    body:
      is_active: false
    expect_status: 200

  - action: delay
    ms: 2000

  # First boot — should be Rejected (station inactive)
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000
    capture:
      retryInterval: "payload.retryInterval"
      bootStatus: "payload.status"

  - action: assert
    field: "payload.status"
    equals: "Rejected"

  # Reactivate station so retry will be Accepted
  - action: api_call
    method: PATCH
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/active"
    body:
      is_active: true
    expect_status: 200

  - action: delay
    ms: 2000

  # Retry boot — should be Accepted (station now active)
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 5
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000
    capture:
      heartbeatInterval: "payload.heartbeatIntervalSec"
      bootStatus: "payload.status"

  - action: assert
    field: "payload.status"
    equals: "Accepted"
