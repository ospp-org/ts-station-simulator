name: "Boot Rejected"
description: "Force-reject next boot via API, send BootNotification, assert Rejected, then retry and assert Accepted."
station:
  stationId: "stn_0000001d"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
    auto_boot: false
    auto_retry_boot: false
steps:
  # Reset sandbox state for this station
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/conformance/reset?station={{stationId}}"
    expect_status: 200

  - action: delay
    ms: 1000

  # Setup: force next boot to be rejected
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/force-reject"
    expect_status: 200

  - action: delay
    ms: 3000

  # First boot — should be Rejected
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000
    capture:
      retryInterval: "payload.retryInterval"
      bootStatus: "payload.status"

  - action: assert
    field: "payload.status"
    equals: "Rejected"

  - action: delay
    ms: 2000

  # Retry boot — should be Accepted (force-reject auto-clears)
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 5
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000
    capture:
      heartbeatInterval: "payload.heartbeatIntervalSec"
      bootStatus: "payload.status"

  - action: assert
    field: "payload.status"
    equals: "Accepted"
