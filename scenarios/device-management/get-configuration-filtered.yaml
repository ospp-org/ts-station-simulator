name: "Get Configuration (filtered)"
description: "Read a subset of the station's persisted configuration via the admin REST endpoint with a ?keys=... filter."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # Filtered admin read — server returns only the requested keys.
  # Companion to get-configuration.yaml (unfiltered variant). Mirrors the
  # OSPP GetConfiguration `keys` semantics (zero-or-more ConfigKey filter)
  # at the admin-REST level.
  - action: api_call
    method: GET
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/config?keys=HeartbeatIntervalSeconds,MeterValuesInterval"
    expect_status: 200
