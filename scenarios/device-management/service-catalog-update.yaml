name: "Service Catalog Update"
description: "Update the service catalog and receive Accepted with previous catalog version"
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: api_call
    method: PUT
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/catalog"
    body:
      services:
        - serviceId: "{{serviceId_1}}"
          serviceName: "Premium Wash"
          pricingType: "PerMinute"
          priceCreditsPerMinute: 100
          available: true
    expect_status: 202

  - action: wait_for
    message: UpdateServiceCatalog
    messageType: Request
    timeout_ms: 15000
    capture:
      catalogVersion: "payload.catalogVersion"

  - action: send
    message: UpdateServiceCatalog
    messageType: Response
    payload:
      status: "Accepted"
      previousCatalogVersion: "1.0.0"
