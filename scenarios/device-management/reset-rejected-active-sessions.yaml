name: "Reset Rejected Active Sessions"
description: "Reset is rejected because there are active service sessions on the station"
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Spec-mandated post-Boot StatusNotification (CORE-004 MUST):
  # bay state is Unknown until the station emits StatusNotification.
  # Without this, the server rejects subsequent /sessions/start with
  # 3002 BAY_NOT_READY. ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/start"
    background: true
    body:
      bay_id: "{{bayId_1}}"
      service_id: "{{serviceId_1}}"
      duration_seconds: 300
    expect_status: 201

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"

  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/testing/trigger-command/{{stationId}}"
    body:
      command: "Reset"
      payload:
        type: "Soft"
    expect_status: 202

  - action: wait_for
    message: Reset
    messageType: Request
    timeout_ms: 15000

  - action: send
    message: Reset
    messageType: Response
    payload:
      status: "Rejected"
      errorCode: 3016
      errorText: "ACTIVE_SESSIONS_PRESENT"

  # --- Pool-hygiene teardown: end the session this scenario started so the reused
  #     pooled station is returned clean. Appended after all assertions — does not
  #     change what the scenario tests. (Class: session-leak.)
  - action: send
    message: SessionEnded
    messageType: Event
    payload:
      sessionId: "{{captured.sessionId}}"
      bayId: "{{captured.bayId}}"
      reason: "Local"
      actualDurationSeconds: 1
      creditsCharged: 0
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Available"
      previousStatus: "Occupied"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true
