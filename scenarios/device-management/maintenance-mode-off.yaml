name: "Maintenance Mode Off"
description: "Disable maintenance mode on a bay and restore Available status"
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Unavailable"
      services:
        - serviceId: "{{serviceId_1}}"
          available: false

  # Discover real persisted bayIds for this station (Drift 6 fix).
  - action: api_call
    method: GET
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}"
    expect_status: 200
    capture:
      real_bay_id_1: data.bays.0.bayId

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/maintenance"
    body:
      bayId: "{{captured.real_bay_id_1}}"
      enabled: false
      reason: "Scheduled cleaning"
    expect_status: 202

  - action: wait_for
    message: SetMaintenanceMode
    messageType: Request
    timeout_ms: 15000

  - action: send
    message: SetMaintenanceMode
    messageType: Response
    payload:
      status: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      previousStatus: "Unavailable"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true
