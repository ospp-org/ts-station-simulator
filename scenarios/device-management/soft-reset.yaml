name: "Soft Reset"
description: "Soft reset flow: handler accepts, disconnects, reconnects, auto-boots"
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "Reset"
      payload:
        type: "Soft"
    expect_status: 200

  # Handler auto-responds Accepted + destroyConnection after 1s delay
  - action: wait_for
    message: Reset
    messageType: Request
    timeout_ms: 15000

  # Wait for: handler 1s delay + disconnect + reconnect 5s + auto-boot
  - action: delay
    ms: 10000

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 20000

  - action: assert
    field: "payload.status"
    equals: "Accepted"
