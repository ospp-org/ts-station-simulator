name: "Get Configuration"
description: "Get all configuration keys from the station"
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "GetConfiguration"
      payload: {}
    expect_status: 200

  - action: wait_for
    message: GetConfiguration
    messageType: Request
    timeout_ms: 15000

  - action: send
    message: GetConfiguration
    messageType: Response
    payload:
      configuration:
        - key: "HeartbeatInterval"
          value: "30"
          readonly: false
        - key: "MeterValuesInterval"
          value: "15"
          readonly: false
        - key: "StatusNotificationInterval"
          value: "0"
          readonly: false
