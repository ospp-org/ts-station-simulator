name: "Diagnostics Upload"
description: "Full diagnostics lifecycle: collect, upload, and report success"
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "GetDiagnostics"
      payload:
        uploadUrl: "https://diagnostics.example.com/upload"
    expect_status: 200

  - action: wait_for
    message: GetDiagnostics
    messageType: Request
    timeout_ms: 15000
    capture:
      uploadUrl: "payload.uploadUrl"

  - action: send
    message: GetDiagnostics
    messageType: Response
    payload:
      status: "Accepted"
      fileName: "diag_{{stationId}}.tar.gz"

  - action: send
    message: DiagnosticsNotification
    messageType: Event
    payload:
      status: "Collecting"
      progress: 0

  - action: delay
    ms: 500

  - action: send
    message: DiagnosticsNotification
    messageType: Event
    payload:
      status: "Collecting"
      progress: 100

  - action: send
    message: DiagnosticsNotification
    messageType: Event
    payload:
      status: "Uploading"
      progress: 0

  - action: delay
    ms: 500

  - action: send
    message: DiagnosticsNotification
    messageType: Event
    payload:
      status: "Uploaded"
      fileName: "diag_{{stationId}}.tar.gz"
