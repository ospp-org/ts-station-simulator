name: "Trigger Message Heartbeat"
description: "Server triggers a Heartbeat message from the station"
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/trigger-message"
    body:
      requestedMessage: "Heartbeat"
    expect_status: 202

  - action: wait_for
    message: TriggerMessage
    messageType: Request
    timeout_ms: 15000

  - action: send
    message: TriggerMessage
    messageType: Response
    payload:
      status: "Accepted"

  - action: send
    message: Heartbeat
    payload: {}
