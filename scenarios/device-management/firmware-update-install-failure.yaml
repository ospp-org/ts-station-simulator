name: "Firmware Update Install Failure"
description: "Firmware update fails during installation due to checksum mismatch"
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
        deviceManagementSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/firmware"
    body:
      firmwareUrl: "https://cdn.example.com/firmware/v2.0.0.bin"
      firmwareVersion: "2.0.0"
      checksum: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
      signature: "MEUCIQDexample"
    expect_status: 202

  - action: wait_for
    message: UpdateFirmware
    messageType: Request
    timeout_ms: 15000
    capture:
      firmwareVersion: "payload.firmwareVersion"

  - action: send
    message: UpdateFirmware
    messageType: Response
    payload:
      status: "Accepted"

  - action: send
    message: FirmwareStatusNotification
    messageType: Event
    payload:
      status: "Downloading"
      firmwareVersion: "{{captured.firmwareVersion}}"
      progress: 0

  - action: delay
    ms: 500

  - action: send
    message: FirmwareStatusNotification
    messageType: Event
    payload:
      status: "Downloaded"
      firmwareVersion: "{{captured.firmwareVersion}}"

  - action: delay
    ms: 500

  - action: send
    message: FirmwareStatusNotification
    messageType: Event
    payload:
      status: "Installing"
      firmwareVersion: "{{captured.firmwareVersion}}"
      progress: 0

  - action: delay
    ms: 500

  - action: send
    message: FirmwareStatusNotification
    messageType: Event
    payload:
      status: "Failed"
      firmwareVersion: "{{captured.firmwareVersion}}"
      errorText: "Installation failed: checksum mismatch"
