name: "Session seqNo Monotonic"
description: "5 MeterValues emitted in sequence with auto-injected seqNo 0..4. Final StopService Accepted carries finalSeqNo=5. Validates spec v0.4.0 §3.2 per-session monotonic counter (CSMS-side check: meter_values rows have monotonic seq_no per sessionId)."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "StartService"
      payload:
        sessionId: "sess_00000001"
        bayId: "{{bayId_1}}"
        serviceId: "{{serviceId_1}}"
        durationSeconds: 300
        sessionSource: "MobileApp"
    expect_status: 200

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"
      serviceId: "payload.serviceId"

  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Available"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  # --- 5 MeterValues — auto-inject seqNo 0,1,2,3,4 ---
  - action: delay
    ms: 300

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:00:30.000Z"
      values:
        liquidMl: 200
        energyWh: 50

  - action: delay
    ms: 300

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:01:00.000Z"
      values:
        liquidMl: 400
        energyWh: 100

  - action: delay
    ms: 300

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:01:30.000Z"
      values:
        liquidMl: 600
        energyWh: 150

  - action: delay
    ms: 300

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:02:00.000Z"
      values:
        liquidMl: 800
        energyWh: 200

  - action: delay
    ms: 300

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:02:30.000Z"
      values:
        liquidMl: 1000
        energyWh: 250

  # --- Trigger StopService — handler emits StopServiceResponse with
  # finalSeqNo=5 and trailing SessionEnded(TimerExpired) with seqNo=5,
  # finalSeqNo=5. ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "StopService"
      payload:
        bayId: "{{captured.bayId}}"
        sessionId: "{{captured.sessionId}}"
    expect_status: 200

  - action: wait_for
    message: StopService
    messageType: Request
    timeout_ms: 15000

  # Handler auto-emits StopServiceResponse Accepted (with finalSeqNo=5)
  # and trailing SessionEnded EVENT (with seqNo=5, finalSeqNo=5).
  # UAT verification on csms-server side confirms emission shape +
  # monotonic seq_no rows in meter_values table.
  - action: delay
    ms: 500
