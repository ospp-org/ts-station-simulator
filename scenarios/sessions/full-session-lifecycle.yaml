name: "Full Session Lifecycle"
description: "Complete session lifecycle: boot, trigger StartService via API, accept, StatusNotification Occupied, MeterValues, trigger StopService via API, accept with duration/credits, SessionEnded event, StatusNotification Available."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bays Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_2}}"
      bayNumber: 2
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService via canonical REST ---
  # background: true — /sessions/start blocks on SessionReadySignal::wait
  # until the station sends StartService Response over MQTT
  # (SessionController.php:73). Scenario continues to wait_for + send
  # Response below while the fetch is in flight; the server resolves the
  # HTTP request after the station Response.
  - action: delay
    ms: 500

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/start"
    background: true
    body:
      bay_id: "{{bayId_1}}"
      service_id: "{{serviceId_1}}"
      duration_seconds: 60
    expect_status: 201

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"
      serviceId: "payload.serviceId"
      durationSeconds: "payload.durationSeconds"

  # --- Accept StartService ---
  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Occupied ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Available"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  # --- MeterValues ---
  - action: delay
    ms: 500

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-01-30T12:01:00.000Z"
      values:
        liquidMl: 500
        energyWh: 100

  - action: delay
    ms: 500

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-01-30T12:02:00.000Z"
      values:
        liquidMl: 1200
        energyWh: 250

  # --- Trigger StopService via canonical REST ---
  # /sessions/{id}/stop does NOT block on station Response
  # (SessionController.php:105-148 returns 200 immediately after
  # stopSessionAction->execute); foreground api_call is fine. The session
  # id from the captured StartService Request payload (server-generated)
  # is the path parameter.
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/{{captured.sessionId}}/stop"
    expect_status: 200

  - action: wait_for
    message: StopService
    messageType: Request
    timeout_ms: 15000

  # --- Accept StopService ---
  - action: send
    message: StopService
    messageType: Response
    payload:
      status: "Accepted"
      actualDurationSeconds: 60
      creditsCharged: 6000
      meterValues:
        liquidMl: 1800
        energyWh: 400

  # --- SessionEnded event ---
  - action: send
    message: SessionEnded
    messageType: Event
    payload:
      sessionId: "{{captured.sessionId}}"
      bayId: "{{captured.bayId}}"
      reason: "TimerExpired"
      actualDurationSeconds: 60
      creditsCharged: 6000
      meterValues:
        liquidMl: 1800
        energyWh: 400

  # --- StatusNotification Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Available"
      previousStatus: "Occupied"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: true
