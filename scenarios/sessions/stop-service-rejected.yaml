# Placeholders overridable via --var KEY=VALUE on `simulator run`:
#   {{stationId}}, {{serialNumber}}, {{bayId_1}}, {{serviceId_1}}
# Example — bind to real CSMS state for Phase 3/4 coverage:
#   simulator run --scenario scenarios/sessions/stop-service-rejected.yaml --target uat \
#     --station stn_realstation \
#     --var bayId_1=bay_realbay001 --var serviceId_1=svc_wash_basic
name: "Stop Service Rejected - Session Not Found"
description: "POST /api/v1/sessions/{id}/stop with an unknown sessionId returns HTTP 404 SESSION_NOT_FOUND server-side without dispatching to the station. Original station-rejection test (errorCode 3006) is no longer reachable: server pre-validates the session ID; the station never sees a StopService Request for an unknown session."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StopService for nonexistent session via API ---
  # New endpoint pre-validates sessionId server-side. Unknown sessions return
  # HTTP 404 SESSION_NOT_FOUND directly; no MQTT dispatch to the station occurs,
  # so the previous wait_for StopService + send Rejected Response is no longer
  # exercised. Sprint B3 follow-up: rewrite test to use a real (active) session
  # then call /stop with a DIFFERENT session's id to test SESSION_MISMATCH (403),
  # or add a station-direct chaos scenario for the missing coverage.
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/sess_00000099/stop"
    expect_status: 404
