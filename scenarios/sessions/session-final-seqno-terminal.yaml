# Placeholders overridable via --var KEY=VALUE on `simulator run`:
#   {{stationId}}, {{serialNumber}}, {{bayId_1}}, {{serviceId_1}}
# Example — bind to real CSMS state for Phase 3/4 coverage:
#   simulator run --scenario scenarios/sessions/session-final-seqno-terminal.yaml --target uat \
#     --station stn_realstation \
#     --var bayId_1=bay_realbay001 --var serviceId_1=svc_wash_basic
name: "Session finalSeqNo Terminal Marker"
description: "3 MeterValues emitted (seqNo 0,1,2). StopService Accepted carries finalSeqNo=3. Two late MeterValues with explicit seqNo 99 and 100 emitted post-stop. Per spec v0.4.0 §3.2, csms-server MUST discard the late events as seqNo > finalSeqNo."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/start"
    background: true
    body:
      bay_id: "{{bayId_1}}"
      service_id: "{{serviceId_1}}"
      duration_seconds: 300
    expect_status: 201

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"
      serviceId: "payload.serviceId"

  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Available"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  # --- 3 MeterValues — auto-inject seqNo 0, 1, 2 ---
  - action: delay
    ms: 300

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:00:30.000Z"
      values:
        liquidMl: 300
        energyWh: 75

  - action: delay
    ms: 300

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:01:00.000Z"
      values:
        liquidMl: 600
        energyWh: 150

  - action: delay
    ms: 300

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:01:30.000Z"
      values:
        liquidMl: 900
        energyWh: 225

  # --- Trigger StopService — handler stamps finalSeqNo=3 on the
  # Accepted Response and trailing SessionEnded. After this point,
  # session is removed from station.sessions, so subsequent MeterValues
  # with the same sessionId no longer auto-advance the counter — they
  # propagate to the broker with their explicit seqNo from YAML. ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/{{captured.sessionId}}/stop"
    expect_status: 200

  - action: wait_for
    message: StopService
    messageType: Request
    timeout_ms: 15000

  # Handler auto-emits StopServiceResponse Accepted with finalSeqNo=3
  # and trailing SessionEnded EVENT with seqNo=3, finalSeqNo=3, then
  # removes the session from station.sessions.
  - action: delay
    ms: 500

  # --- 2 late MeterValues with explicit seqNo > finalSeqNo.
  # csms-server MUST discard these per spec v0.4.0 §3.2 stale-event filter. ---
  - action: delay
    ms: 100

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:02:00.000Z"
      seqNo: 99
      values:
        liquidMl: 1100
        energyWh: 280

  - action: delay
    ms: 100

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-05-09T12:02:30.000Z"
      seqNo: 100
      values:
        liquidMl: 1200
        energyWh: 300
