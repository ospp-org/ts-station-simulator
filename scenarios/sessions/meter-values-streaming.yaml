# Placeholders overridable via --var KEY=VALUE on `simulator run`:
#   {{stationId}}, {{serialNumber}}, {{bayId_1}}, {{serviceId_1}}
# Example — bind to real CSMS state for Phase 3/4 coverage:
#   simulator run --scenario scenarios/sessions/meter-values-streaming.yaml --target uat \
#     --station stn_realstation \
#     --var bayId_1=bay_realbay001 --var serviceId_1=svc_wash_basic
name: "Meter Values Streaming"
description: "Boot, trigger StartService via API, accept, send StatusNotification Occupied, send 3 MeterValues EVENTs with increasing cumulative values and delays between them."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService via canonical REST ---
  # background: true — /sessions/start is synchronous (blocks on
  # SessionReadySignal::wait until station Response arrives via MQTT).
  # The scenario must run its wait_for + send Response below while the
  # fetch is in flight; the server resolves the HTTP request after the
  # station Response (server-generated session id returned as data.id,
  # but we capture it from the MQTT StartService Request payload).
  - action: delay
    ms: 500

  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/start"
    background: true
    body:
      bay_id: "{{bayId_1}}"
      service_id: "{{serviceId_1}}"
      duration_seconds: 300
    expect_status: 201

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"
      serviceId: "payload.serviceId"

  # --- Accept StartService ---
  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Occupied ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Available"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  # --- MeterValues 1 ---
  - action: delay
    ms: 500

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-01-30T12:01:00.000Z"
      values:
        liquidMl: 500
        consumableMl: 50
        energyWh: 100

  # --- MeterValues 2 ---
  - action: delay
    ms: 500

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-01-30T12:02:00.000Z"
      values:
        liquidMl: 1200
        consumableMl: 120
        energyWh: 250

  # --- MeterValues 3 ---
  - action: delay
    ms: 500

  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-01-30T12:03:00.000Z"
      values:
        liquidMl: 1800
        consumableMl: 180
        energyWh: 400
