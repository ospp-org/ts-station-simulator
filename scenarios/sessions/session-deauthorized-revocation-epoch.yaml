name: "Session Deauthorized via RevocationEpoch Bump"
description: "Mid-session RevocationEpoch bump (via ChangeConfiguration) invalidates the offline pass under which session was authorized. Station emits SessionEnded with reason Deauthorized; spec v0.4.0 mandates creditsCharged: 0 + security audit on csms-server."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "StartService"
      payload:
        sessionId: "sess_00000001"
        bayId: "{{bayId_1}}"
        serviceId: "{{serviceId_1}}"
        durationSeconds: 300
        sessionSource: "OfflinePass"
    expect_status: 200

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"
      serviceId: "payload.serviceId"

  # --- Accept StartService ---
  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Occupied ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Available"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  # --- Mid-session: trigger RevocationEpoch bump via ChangeConfiguration.
  # CSMS pushes new revocationEpoch=1; the station's
  # ChangeConfigurationHandler captures it onto currentRevocationEpoch. ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "ChangeConfiguration"
      payload:
        keys:
          - key: "revocationEpoch"
            value: "1"
    expect_status: 200

  - action: wait_for
    message: ChangeConfiguration
    messageType: Request
    timeout_ms: 15000

  # Handler auto-accepts (results: Accepted) AND captures revocationEpoch
  # onto station.currentRevocationEpoch via the v0.4.0 sniff.
  - action: delay
    ms: 500

  # --- SessionEnded (Deauthorized) — full refund per spec.
  # Auto-injected seqNo: 0, finalSeqNo: 0.
  - action: send
    message: SessionEnded
    messageType: Event
    payload:
      sessionId: "{{captured.sessionId}}"
      bayId: "{{captured.bayId}}"
      reason: "Deauthorized"
      actualDurationSeconds: 2
      creditsCharged: 0

  # --- StatusNotification Finishing → Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Finishing"
      previousStatus: "Occupied"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  - action: delay
    ms: 500

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Available"
      previousStatus: "Finishing"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: true
