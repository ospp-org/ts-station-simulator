name: "Session With Reservation"
description: "Reserve bay first via ReserveBay trigger-command, then start session with reservationId. Bay transitions: Available -> Reserved -> Occupied."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger ReserveBay via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "ReserveBay"
      payload:
        bayId: "{{bayId_1}}"
        reservationId: "rsv_a1b2c3d4"
        expirationTime: "2099-01-01T00:00:00.000Z"
        sessionSource: "MobileApp"
    expect_status: 200

  - action: wait_for
    message: ReserveBay
    messageType: Request
    timeout_ms: 15000
    capture:
      reservationId: "payload.reservationId"
      bayId: "payload.bayId"

  # --- Accept ReserveBay ---
  - action: send
    message: ReserveBay
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Reserved ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Reserved"
      previousStatus: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService with reservationId via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "StartService"
      payload:
        sessionId: "sess_00000001"
        bayId: "{{captured.bayId}}"
        serviceId: "{{serviceId_1}}"
        durationSeconds: 300
        sessionSource: "MobileApp"
        reservationId: "{{captured.reservationId}}"
    expect_status: 200

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      serviceId: "payload.serviceId"
      durationSeconds: "payload.durationSeconds"
      reservationId: "payload.reservationId"

  # --- Accept StartService ---
  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Occupied ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Reserved"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false
