# Placeholders overridable via --var KEY=VALUE on `simulator run`:
#   {{stationId}}, {{serialNumber}}, {{bayId_1}}, {{serviceId_1}}
# Example — bind to real CSMS state for Phase 3/4 coverage:
#   simulator run --scenario scenarios/sessions/session-with-reservation.yaml --target uat \
#     --station stn_realstation \
#     --var bayId_1=bay_realbay001 --var serviceId_1=svc_wash_basic
name: "Session With Reservation"
description: "Reserve bay first via ReserveBay trigger-command, then start session with reservationId. Bay transitions: Available -> Reserved -> Occupied."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger ReserveBay via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/reservations"
    body:
      bay_id: "{{bayId_1}}"
      duration_minutes: 5
      session_source: "MobileApp"
    expect_status: 201

  - action: wait_for
    message: ReserveBay
    messageType: Request
    timeout_ms: 15000
    capture:
      reservationId: "payload.reservationId"
      bayId: "payload.bayId"

  # --- Accept ReserveBay ---
  - action: send
    message: ReserveBay
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Reserved ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Reserved"
      previousStatus: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService with reservationId via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/start"
    background: true
    body:
      bay_id: "{{captured.bayId}}"
      service_id: "{{serviceId_1}}"
      duration_seconds: 300
      reservation_id: "{{captured.reservationId}}"
    expect_status: 201

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      serviceId: "payload.serviceId"
      durationSeconds: "payload.durationSeconds"
      reservationId: "payload.reservationId"

  # --- Accept StartService ---
  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Occupied ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Reserved"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  # --- Pool-hygiene teardown: end the session this scenario started so the reused
  #     pooled station is returned clean. Appended after all assertions — does not
  #     change what the scenario tests. (Class: session-leak.)
  - action: send
    message: SessionEnded
    messageType: Event
    payload:
      sessionId: "{{captured.sessionId}}"
      bayId: "{{captured.bayId}}"
      reason: "Local"
      actualDurationSeconds: 1
      creditsCharged: 0
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Available"
      previousStatus: "Occupied"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: true
