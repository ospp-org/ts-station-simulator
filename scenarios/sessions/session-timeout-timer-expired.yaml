# Placeholders overridable via --var KEY=VALUE on `simulator run`:
#   {{stationId}}, {{serialNumber}}, {{bayId_1}}, {{serviceId_1}}
# Example — bind to real CSMS state for Phase 3/4 coverage:
#   simulator run --scenario scenarios/sessions/session-timeout-timer-expired.yaml --target uat \
#     --station stn_realstation \
#     --var bayId_1=bay_realbay001 --var serviceId_1=svc_wash_basic
name: "Session Timeout - Timer Expired"
description: "Session auto-stops when durationSeconds elapses. Station sends SessionEnded with reason TimerExpired, transitions through Finishing to Available."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "StartService"
      payload:
        sessionId: "sess_00000001"
        bayId: "{{bayId_1}}"
        serviceId: "{{serviceId_1}}"
        durationSeconds: 300
        sessionSource: "MobileApp"
    expect_status: 200

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"
      serviceId: "payload.serviceId"
      durationSeconds: "payload.durationSeconds"

  # --- Accept StartService ---
  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Occupied ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Available"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  # --- Simulate timer expiring (short delay for test) ---
  - action: delay
    ms: 2000

  # --- SessionEnded - TimerExpired ---
  - action: send
    message: SessionEnded
    messageType: Event
    payload:
      sessionId: "{{captured.sessionId}}"
      bayId: "{{captured.bayId}}"
      reason: "TimerExpired"
      actualDurationSeconds: 2
      creditsCharged: 200

  # --- StatusNotification Finishing ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Finishing"
      previousStatus: "Occupied"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  - action: delay
    ms: 500

  # --- StatusNotification Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Available"
      previousStatus: "Finishing"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: true
