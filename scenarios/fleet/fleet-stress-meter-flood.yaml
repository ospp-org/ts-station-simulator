name: "Fleet Stress Meter Flood"
description: "Rapid MeterValues flood test. Boots, starts a session, then sends 10 MeterValues EVENTs with only 100ms between each, with increasing liquidMl and energyWh values."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Bay Available ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # --- Trigger StartService via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "StartService"
      payload:
        sessionId: "sess_00000001"
        bayId: "{{bayId_1}}"
        serviceId: "{{serviceId_1}}"
        durationSeconds: 300
        sessionSource: "MobileApp"
    expect_status: 200

  # --- Wait for StartService ---
  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"
      serviceId: "payload.serviceId"

  # --- Accept StartService ---
  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  # --- StatusNotification Occupied ---
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      previousStatus: "Available"
      services:
        - serviceId: "{{captured.serviceId}}"
          available: false

  # --- Rapid MeterValues flood: 10 events, 100ms apart ---

  # MeterValues 1
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:01.000Z"
      values:
        liquidMl: 100
        energyWh: 20

  - action: delay
    ms: 100

  # MeterValues 2
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:02.000Z"
      values:
        liquidMl: 200
        energyWh: 40

  - action: delay
    ms: 100

  # MeterValues 3
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:03.000Z"
      values:
        liquidMl: 300
        energyWh: 60

  - action: delay
    ms: 100

  # MeterValues 4
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:04.000Z"
      values:
        liquidMl: 400
        energyWh: 80

  - action: delay
    ms: 100

  # MeterValues 5
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:05.000Z"
      values:
        liquidMl: 500
        energyWh: 100

  - action: delay
    ms: 100

  # MeterValues 6
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:06.000Z"
      values:
        liquidMl: 600
        energyWh: 120

  - action: delay
    ms: 100

  # MeterValues 7
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:07.000Z"
      values:
        liquidMl: 700
        energyWh: 140

  - action: delay
    ms: 100

  # MeterValues 8
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:08.000Z"
      values:
        liquidMl: 800
        energyWh: 160

  - action: delay
    ms: 100

  # MeterValues 9
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:09.000Z"
      values:
        liquidMl: 900
        energyWh: 180

  - action: delay
    ms: 100

  # MeterValues 10
  - action: send
    message: MeterValues
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      sessionId: "{{captured.sessionId}}"
      timestamp: "2026-03-22T10:00:10.000Z"
      values:
        liquidMl: 1000
        energyWh: 200
