# Placeholders overridable via --var KEY=VALUE on `simulator run`:
#   {{stationId}}, {{serialNumber}}, {{bayId_1}}, {{serviceId_1}}
# Example — bind to real CSMS state for Phase 3/4 coverage:
#   simulator run --scenario scenarios/reservations/reserve-rejected-already-reserved.yaml --target uat \
#     --station stn_realstation \
#     --var bayId_1=bay_realbay001 --var serviceId_1=svc_wash_basic
name: "Reserve Rejected - Already Reserved"
description: "Attempt to reserve a bay that is already reserved - verifies the station rejects with errorCode 3014 BAY_RESERVED."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # First ReserveBay - should succeed
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/reservations"
    body:
      bay_id: "{{bayId_1}}"
      duration_minutes: 5
      session_source: "MobileApp"
    expect_status: 201

  - action: wait_for
    message: ReserveBay
    messageType: Request
    timeout_ms: 15000
    capture:
      reservationId: "payload.reservationId"
      bayId: "payload.bayId"

  - action: send
    message: ReserveBay
    messageType: Response
    payload:
      status: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Reserved"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # Second ReserveBay on the same bay - should be rejected.
  # Server propagates the station's Rejected MQTT Response as HTTP 422.
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/reservations"
    body:
      bay_id: "{{bayId_1}}"
      duration_minutes: 5
      session_source: "MobileApp"
    expect_status: 422

  - action: wait_for
    message: ReserveBay
    messageType: Request
    timeout_ms: 15000

  - action: send
    message: ReserveBay
    messageType: Response
    payload:
      status: "Rejected"
      errorCode: 3014
      errorText: "BAY_RESERVED"
