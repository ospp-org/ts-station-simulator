# Placeholders overridable via --var KEY=VALUE on `simulator run`:
#   {{stationId}}, {{serialNumber}}, {{bayId_1}}, {{serviceId_1}}
# Example — bind to real CSMS state for Phase 3/4 coverage:
#   simulator run --scenario scenarios/reservations/reserve-rejected-bay-busy.yaml --target uat \
#     --station stn_realstation \
#     --var bayId_1=bay_realbay001 --var serviceId_1=svc_wash_basic
name: "Reserve Rejected - Bay Busy"
description: "Attempt to reserve an occupied bay - verifies the station rejects with errorCode 3001 BAY_BUSY."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # Trigger StartService to occupy the bay first
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/sessions/start"
    background: true
    body:
      bay_id: "{{bayId_1}}"
      service_id: "{{serviceId_1}}"
      duration_seconds: 300
    expect_status: 201

  - action: wait_for
    message: StartService
    messageType: Request
    timeout_ms: 15000
    capture:
      sessionId: "payload.sessionId"
      bayId: "payload.bayId"

  - action: send
    message: StartService
    messageType: Response
    payload:
      status: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Occupied"
      services:
        - serviceId: "{{serviceId_1}}"
          available: false

  # Trigger ReserveBay on the same occupied bay - should be rejected.
  # Server propagates the station's Rejected MQTT Response as HTTP 422.
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/reservations"
    body:
      bay_id: "{{bayId_1}}"
      duration_minutes: 5
      session_source: "MobileApp"
    expect_status: 409
  # Per C-012: server returns 409 (resource state conflict) pre-MQTT-dispatch;
  # no ReserveBay Request is published. The 409 is the final assertion.

  # --- Pool-hygiene teardown: end the session this scenario started so the reused
  #     pooled station is returned clean. Appended after all assertions — does not
  #     change what the scenario tests. (Class: session-leak.)
  - action: send
    message: SessionEnded
    messageType: Event
    payload:
      sessionId: "{{captured.sessionId}}"
      bayId: "{{captured.bayId}}"
      reason: "Local"
      actualDurationSeconds: 1
      creditsCharged: 0
  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Available"
      previousStatus: "Occupied"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true
