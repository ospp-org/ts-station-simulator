name: "Reserve and Expire"
description: "Reserve a bay and let the TTL expire - verifies the bay auto-returns to Available after expiration."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [100, 300]
steps:
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{bayId_1}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # Trigger ReserveBay via CSMS API
  # Note: The expirationTime is set to a far-future date in the trigger payload.
  # The CSMS is expected to apply a short TTL (e.g. ~5s) for this test so the
  # reservation expires quickly. The delay below waits for that expiration.
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "ReserveBay"
      payload:
        bayId: "{{bayId_1}}"
        reservationId: "rsv_00000001"
        expirationTime: "2099-01-01T00:00:00.000Z"
        sessionSource: "MobileApp"
    expect_status: 200

  - action: wait_for
    message: ReserveBay
    messageType: Request
    timeout_ms: 15000
    capture:
      reservationId: "payload.reservationId"
      bayId: "payload.bayId"

  - action: send
    message: ReserveBay
    messageType: Response
    payload:
      status: "Accepted"

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Reserved"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true

  # Wait for the reservation to expire
  - action: delay
    ms: 5000

  - action: send
    message: StatusNotification
    messageType: Event
    payload:
      bayId: "{{captured.bayId}}"
      bayNumber: 1
      status: "Available"
      services:
        - serviceId: "{{serviceId_1}}"
          available: true
