name: "Trigger Certificate Renewal"
description: "Boot station, trigger TriggerCertificateRenewal via API, handler auto-responds and sends SignCertificate CSR."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Trigger TriggerCertificateRenewal via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/trigger-cert-renewal"
    body:
      certificateType: "StationCertificate"
    expect_status: 202

  # Handler auto-responds Accepted + auto-sends SignCertificate Request
  - action: wait_for
    message: TriggerCertificateRenewal
    messageType: Request
    timeout_ms: 15000
