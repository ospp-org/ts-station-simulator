name: "Offline Fraud: Rapid Transactions"
description: "Boot station and rapidly send 5 offline TransactionEvent requests in quick succession to simulate a fraud pattern with suspiciously fast transaction submissions."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 5
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 5000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Obtain a real, server-signed offline pass (mirrors offline-pass-authorize.yaml:62-76) ---
  # Captured pass/sub used by all 5 rapid TransactionEvents below (the (α-bag)
  # boundary resolver requires real opass_/sub_ — hardcoded literals were
  # rejected by the resolver post-csms-server d106044).
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/offline/passes"
    body:
      deviceId: "dev_smoke_fraud01"
      serviceIds:
        - "{{serviceId_1}}"
      maxUses: 10
      maxTotalCredits: 5000
      durationHours: 24
    expect_status: 201
    capture:
      offlinePassId: "data.attributes.passId"
      offlineUserSub: "data.attributes.sub"
      passDeviceId: "data.attributes.deviceId"

  # --- Rapid TransactionEvent #1 ---
  - action: send
    message: TransactionEvent
    payload:
      offlineTxId: "otx_aa00000001"
      offlinePassId: "{{captured.offlinePassId}}"
      userId: "{{captured.offlineUserSub}}"
      deviceId: "{{captured.passDeviceId}}"
      bayId: "{{bayId_1}}"
      serviceId: "{{serviceId_1}}"
      startedAt: "2026-01-01T10:00:00.000Z"
      endedAt: "2026-01-01T10:05:00.000Z"
      durationSeconds: 300
      creditsCharged: 150
      receipt:
        data: "eyJ0eENvdW50ZXIiOjF9"
        signature: "test_sig_1"
        signatureAlgorithm: "ECDSA-P256-SHA256"
      txCounter: 1
      passCounter: 1
      meterValues:
        liquidMl: 2500
        energyWh: 85

  - action: delay
    ms: 100

  # --- Rapid TransactionEvent #2 ---
  - action: send
    message: TransactionEvent
    payload:
      offlineTxId: "otx_aa00000002"
      offlinePassId: "{{captured.offlinePassId}}"
      userId: "{{captured.offlineUserSub}}"
      deviceId: "{{captured.passDeviceId}}"
      bayId: "{{bayId_1}}"
      serviceId: "{{serviceId_1}}"
      startedAt: "2026-01-01T10:05:30.000Z"
      endedAt: "2026-01-01T10:10:30.000Z"
      durationSeconds: 300
      creditsCharged: 150
      receipt:
        data: "eyJ0eENvdW50ZXIiOjJ9"
        signature: "test_sig_2"
        signatureAlgorithm: "ECDSA-P256-SHA256"
      txCounter: 2
      passCounter: 2
      meterValues:
        liquidMl: 2400
        energyWh: 80

  - action: delay
    ms: 100

  # --- Rapid TransactionEvent #3 ---
  - action: send
    message: TransactionEvent
    payload:
      offlineTxId: "otx_aa00000003"
      offlinePassId: "{{captured.offlinePassId}}"
      userId: "{{captured.offlineUserSub}}"
      deviceId: "{{captured.passDeviceId}}"
      bayId: "{{bayId_1}}"
      serviceId: "{{serviceId_1}}"
      startedAt: "2026-01-01T10:11:00.000Z"
      endedAt: "2026-01-01T10:16:00.000Z"
      durationSeconds: 300
      creditsCharged: 150
      receipt:
        data: "eyJ0eENvdW50ZXIiOjN9"
        signature: "test_sig_3"
        signatureAlgorithm: "ECDSA-P256-SHA256"
      txCounter: 3
      passCounter: 3
      meterValues:
        liquidMl: 2600
        energyWh: 90

  - action: delay
    ms: 100

  # --- Rapid TransactionEvent #4 ---
  - action: send
    message: TransactionEvent
    payload:
      offlineTxId: "otx_aa00000004"
      offlinePassId: "{{captured.offlinePassId}}"
      userId: "{{captured.offlineUserSub}}"
      deviceId: "{{captured.passDeviceId}}"
      bayId: "{{bayId_1}}"
      serviceId: "{{serviceId_1}}"
      startedAt: "2026-01-01T10:16:30.000Z"
      endedAt: "2026-01-01T10:21:30.000Z"
      durationSeconds: 300
      creditsCharged: 150
      receipt:
        data: "eyJ0eENvdW50ZXIiOjR9"
        signature: "test_sig_4"
        signatureAlgorithm: "ECDSA-P256-SHA256"
      txCounter: 4
      passCounter: 4
      meterValues:
        liquidMl: 2300
        energyWh: 75

  - action: delay
    ms: 100

  # --- Rapid TransactionEvent #5 ---
  - action: send
    message: TransactionEvent
    payload:
      offlineTxId: "otx_aa00000005"
      offlinePassId: "{{captured.offlinePassId}}"
      userId: "{{captured.offlineUserSub}}"
      deviceId: "{{captured.passDeviceId}}"
      bayId: "{{bayId_1}}"
      serviceId: "{{serviceId_1}}"
      startedAt: "2026-01-01T10:22:00.000Z"
      endedAt: "2026-01-01T10:27:00.000Z"
      durationSeconds: 300
      creditsCharged: 150
      receipt:
        data: "eyJ0eENvdW50ZXIiOjV9"
        signature: "test_sig_5"
        signatureAlgorithm: "ECDSA-P256-SHA256"
      txCounter: 5
      passCounter: 5
      meterValues:
        liquidMl: 2550
        energyWh: 88
