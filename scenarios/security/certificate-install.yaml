name: "Certificate Install Accepted"
description: "Boot station, trigger CertificateInstall via API, wait for the request on MQTT, and respond with Accepted status."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Trigger CertificateInstall via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/stations/{{stationId}}/trigger-command"
    body:
      action: "CertificateInstall"
      payload:
        certificateType: "StationCertificate"
        certificate: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJALRiMLAh...\n-----END CERTIFICATE-----"
    expect_status: 200

  # --- Wait for CertificateInstall from server ---
  - action: wait_for
    message: CertificateInstall
    messageType: Request
    timeout_ms: 15000

  # --- Respond Accepted ---
  - action: send
    message: CertificateInstall
    messageType: Response
    payload:
      status: "Accepted"
      certificateSerialNumber: "ABC123DEF456"
