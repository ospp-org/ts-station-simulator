name: "Certificate Install Accepted"
description: "Boot station, trigger CertificateInstall via API, wait for the request on MQTT, and respond with Accepted status."

# Certificate lifecycle is PLATFORM-managed: install-certificate is gated by
# permission:platform.certificates.manage (admin.php), which no tenant role carries.
# Authenticate as the persistent platform admin AND suppress X-Organization-Id on the
# install-certificate call (omit_org_header) so the platform permission resolves at the
# NULL team — org-scoping it 403s the NULL-scoped platform admin. Verified on UAT.
auth:
  email_env: UAT_E2E_PLATFORM_ADMIN_EMAIL
  password_env: UAT_E2E_PLATFORM_ADMIN_PASSWORD
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Trigger CertificateInstall via API ---
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/admin/stations/{{stationId}}/install-certificate"
    omit_org_header: true
    body:
      certificateType: "StationCertificate"
      certificate: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJALRiMLAh...\n-----END CERTIFICATE-----"
    expect_status: 202

  # --- Wait for CertificateInstall from server ---
  - action: wait_for
    message: CertificateInstall
    messageType: Request
    timeout_ms: 15000

  # --- Respond Accepted ---
  - action: send
    message: CertificateInstall
    messageType: Response
    payload:
      status: "Accepted"
      certificateSerialNumber: "ABC123DEF456"
