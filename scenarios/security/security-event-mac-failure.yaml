name: "SecurityEvent: MacVerificationFailure"
description: "Boot station and report a MAC verification failure security event with Critical severity."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 5000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- SecurityEvent: MacVerificationFailure ---
  - action: send
    message: SecurityEvent
    messageType: Event
    payload:
      eventId: "sec_00000001"
      type: "MacVerificationFailure"
      severity: "Critical"
      timestamp: "2026-01-01T12:00:00.000Z"
      details:
        action: "StartService"
        expectedMac: "abc123"
        receivedMac: "def456"
        messageId: "msg_001"
