name: "Offline Transaction Reconciliation"
description: "Boot station and send a TransactionEvent request to reconcile an offline transaction with full receipt and meter values."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 1
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: true
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 5000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Obtain a real, server-signed offline pass (mirrors offline-pass-authorize.yaml:62-76) ---
  # Pre-(α-bag) the scenario used hardcoded `opass_a000000001` / `sub_testuser01`
  # which don't exist server-side; the controller-boundary translation (csms-server
  # commit d106044) now rejects unknown offlinePassIds at the boundary with a
  # legible reason instead of throwing deeper. We fetch a real pass via the
  # issuance API so the resolver succeeds and the TransactionEvent reaches the
  # full Reconciler pipeline (this is Phase 1: rejected branch — placeholder
  # receipt sig fails verification and the §5:62 Critical SecurityEvent fires;
  # Phase 2 adds receipt signing per §4.8 for the Accepted branch).
  - action: api_call
    method: POST
    url: "{{target_url}}/api/v1/offline/passes"
    body:
      deviceId: "dev_smoke_recon01"
      serviceIds:
        - "{{serviceId_1}}"
      maxUses: 10
      maxTotalCredits: 5000
      durationHours: 24
    expect_status: 201
    capture:
      offlinePassId: "data.attributes.passId"
      offlineUserSub: "data.attributes.sub"

  # --- TransactionEvent: Offline reconciliation (rejected branch — placeholder sig) ---
  - action: send
    message: TransactionEvent
    payload:
      offlineTxId: "otx_a0000000001"
      offlinePassId: "{{captured.offlinePassId}}"
      userId: "{{captured.offlineUserSub}}"
      bayId: "{{bayId_1}}"
      serviceId: "{{serviceId_1}}"
      startedAt: "2026-01-01T10:00:00.000Z"
      endedAt: "2026-01-01T10:05:00.000Z"
      durationSeconds: 300
      creditsCharged: 150
      receipt:
        data: "eyJ0ZXN0IjoxfQ=="
        signature: "test_sig"
        signatureAlgorithm: "ECDSA-P256-SHA256"
      txCounter: 1
      meterValues:
        liquidMl: 2500
        energyWh: 85

  # --- Wait for response ---
  - action: wait_for
    message: TransactionEvent
    messageType: Response
    timeout_ms: 10000

  # Phase 2: SendStep now signs receipts per §6.2 using the per-station
  # receipt-signing key persisted by PoolBootstrap (<id>-receipt-key.pem).
  # ReceiptVerifier verifies the signature against the receiptSigningPublicKey
  # registered at provisioning, FraudScorer accepts (no signals fire on a
  # well-formed receipt + healthy pass), Reconciler debits wallet via the real
  # WalletDebitAdapter, persists status='reconciled', and emits
  # TransactionReconciled. NO SecurityEvent on this branch (clean accept).
  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- Idempotency re-send (same offlineTxId, fresh envelope messageId) ---
  # Reconciler dedups on offlineTxId before verify/score/debit (Reconciler.php
  # line 55-68). Same idempotencyKey ('otx_'.offlineTxId) means the wallet
  # debit would otherwise re-fire, but wallet_entries.idempotency_key UNIQUE
  # blocks it at the DB level — defense in depth. This re-send proves the
  # Group-1 idempotency-key fix on the real MQTT path (the f5dc68d brief
  # Step-2a override that lets Reconciler control the key instead of letting
  # WalletDebitAdapter generate a fresh one).
  - action: send
    message: TransactionEvent
    payload:
      offlineTxId: "otx_a0000000001"
      offlinePassId: "{{captured.offlinePassId}}"
      userId: "{{captured.offlineUserSub}}"
      bayId: "{{bayId_1}}"
      serviceId: "{{serviceId_1}}"
      startedAt: "2026-01-01T10:00:00.000Z"
      endedAt: "2026-01-01T10:05:00.000Z"
      durationSeconds: 300
      creditsCharged: 150
      receipt:
        data: "placeholder-overwritten-by-SendStep-sign"
        signature: "placeholder-overwritten-by-SendStep-sign"
        signatureAlgorithm: "ECDSA-P256-SHA256"
      txCounter: 1
      meterValues:
        liquidMl: 2500
        energyWh: 85

  - action: wait_for
    message: TransactionEvent
    messageType: Response
    timeout_ms: 10000

  - action: assert
    field: "payload.status"
    equals: "Duplicate"
