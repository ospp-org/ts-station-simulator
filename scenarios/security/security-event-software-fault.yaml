name: "SecurityEvent: SoftwareFault"
description: "Boot station and report a software fault in the MQTT client with Critical severity."
station:
  stationId: "{{stationId}}"
  bayCount: 2
  stationModel: "WashPro X200"
  stationVendor: "SimCorp"
  behavior:
    accept_rate: 1.0
    response_delay_ms: [50, 200]
steps:
  # --- Boot ---
  - action: send
    message: BootNotification
    payload:
      stationId: "{{stationId}}"
      firmwareVersion: "1.0.0"
      stationModel: "WashPro X200"
      stationVendor: "SimCorp"
      serialNumber: "{{serialNumber}}"
      bayCount: 2
      uptimeSeconds: 0
      pendingOfflineTransactions: 0
      timezone: "Europe/Bucharest"
      bootReason: "PowerOn"
      capabilities:
        bleSupported: false
        offlineModeSupported: false
        meterValuesSupported: true
      networkInfo:
        connectionType: "Ethernet"

  - action: wait_for
    message: BootNotification
    messageType: Response
    timeout_ms: 5000

  - action: assert
    field: "payload.status"
    equals: "Accepted"

  # --- SecurityEvent: SoftwareFault ---
  - action: send
    message: SecurityEvent
    messageType: Event
    payload:
      eventId: "sec_0000000a"
      type: "SoftwareFault"
      severity: "Critical"
      timestamp: "2026-01-01T12:00:00.000Z"
      details:
        component: "mqtt_client"
        error: "OutOfMemory"
        stackTrace: "..."
